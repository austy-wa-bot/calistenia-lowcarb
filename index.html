<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2D5A3D">
  <meta name="description" content="CicloFit — Calistenia Progressiva + Keto + Tabata">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180x180.png">
  <title>CicloFit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1 id="page-title">CicloFit</h1>
    </header>

    <main id="content"></main>

    <nav id="bottom-nav">
      <button class="nav-btn active" data-page="inicio" aria-label="Início">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Início</span>
      </button>
      <button class="nav-btn" data-page="exercicios" aria-label="Exercícios">
        <span class="nav-icon">🏋️</span>
        <span class="nav-label">Exercícios</span>
      </button>
      <button class="nav-btn" data-page="timer" aria-label="Timer">
        <span class="nav-icon">⏱️</span>
        <span class="nav-label">Timer</span>
      </button>
      <button class="nav-btn" data-page="dieta" aria-label="Dieta">
        <span class="nav-icon">🥗</span>
        <span class="nav-label">Dieta</span>
      </button>
      <button class="nav-btn" data-page="progresso" aria-label="Progresso">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Progresso</span>
      </button>
    </nav>
  </div>

  <script src="dados/exercicios.js"></script>
  <script src="dados/alimentos.js"></script>
  <script src="dados/receitas.js"></script>
  <script src="paginas/inicio.js"></script>
  <script src="paginas/exercicios.js"></script>
  <script src="paginas/timer.js"></script>
  <script src="paginas/dieta.js"></script>
  <script src="paginas/progresso.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
      navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(reg => {
        if (reg.active && !navigator.serviceWorker.controller) {
          window.location.reload();
        }
        reg.addEventListener('updatefound', () => {
          const installing = reg.installing;
          installing.addEventListener('statechange', () => {
            if (installing.state === 'activated') {
              window.location.reload();
            }
          });
        });
      });
    }
  </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="armGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Shoulder circle -->
  <circle cx="156" cy="184" r="36" fill="url(#armGlow)" opacity=".15"/>

  <!-- Arm: shoulder → elbow → fist -->
  <path d="
    M 128 168
    C 240 144, 340 160, 380 280
    C 400 340, 380 400, 340 400
    C 300 400, 280 360, 300 320
    C 320 280, 360 280, 400 260
    C 440 240, 460 200, 450 160
    C 440 120, 400 110, 370 130
    C 340 150, 320 180, 310 200
  " fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity=".92"/>

  <!-- Bicep accent curve (inner flex line) -->
  <path d="
    M 270 250
    C 300 240, 340 240, 370 260
  " fill="none" stroke="url(#armGlow)" stroke-width="8" stroke-linecap="round" opacity=".7"/>

  <!-- Fist detail -->
  <circle cx="310" cy="200" r="22" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity=".85"/>

  <!-- Accent dot (energy/strength spark) -->
  <circle cx="420" cy="128" r="10" fill="url(#armGlow)" opacity=".8"/>
  <circle cx="440" cy="150" r="5" fill="url(#armGlow)" opacity=".5"/>
</svg>